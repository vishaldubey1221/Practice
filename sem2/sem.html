<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Calculus Numerical Quiz</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #e67e22;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --background-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 650px;
            padding: 30px;
            box-sizing: border-box;
            border-top: 5px solid var(--secondary-color);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            font-size: 1.8em;
        }

        .progress-container {
            width: 100%;
            background-color: #bdc3c7;
            border-radius: 8px;
            margin-bottom: 20px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--secondary-color);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 25px;
            font-size: 1em;
            color: #7f8c8d;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 6px;
        }

        .question {
            font-size: 1.25em;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background-color: #fcfcfc;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.05em;
            text-align: left;
            font-family: inherit;
        }

        .option:hover:not(.disabled) {
            background-color: #fdf3ea;
            border-color: var(--secondary-color);
            transform: translateX(5px);
        }

        .option.correct {
            background-color: #d5f5e3;
            border-color: var(--success-color);
            color: #1e8449;
            font-weight: bold;
        }

        .option.wrong {
            background-color: #fadbd8;
            border-color: var(--danger-color);
            color: #922b21;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
            line-height: 1.4;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 25px;
            width: 100%;
            display: none;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #1a252f;
        }

        .result-container {
            text-align: center;
            display: none;
        }

        .result-score {
            font-size: 3.5em;
            color: var(--secondary-color);
            font-weight: bold;
            margin: 20px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .quiz-container { padding: 20px; }
            .question { font-size: 1.15em; }
            .option { padding: 14px; }
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <h2>Vector Calculus (Numerical)</h2>
    
    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>
    
    <div class="stats">
        <span id="q-tracker">Question: 1/15</span>
        <span id="score-tracker">Score: 0</span>
    </div>

    <div id="quiz-content">
        <div class="question" id="question-text">Loading question...</div>
        <div class="options" id="options-container"></div>
        <div class="feedback" id="feedback-box"></div>
        <button class="btn" id="next-btn" onclick="nextQuestion()">Next Question</button>
    </div>

    <div class="result-container" id="result-content">
        <h2>Practice Complete!</h2>
        <div class="result-score" id="final-score">0/15</div>
        <p id="result-message"></p>
        <button class="btn" style="display: block;" onclick="location.reload()">Re-attempt Numericals</button>
    </div>
</div>

<script>
    const quizData = [
        { 
            q: "If &phi; = x<sup>2</sup>yz<sup>3</sup>, find &nabla;&phi; at the point (1, 1, 1).", 
            options: ["2î + ĵ + 3k̂", "î + 2ĵ + 3k̂", "2î + 2ĵ + k̂", "3î + ĵ + 2k̂"], 
            answer: 0, 
            explanation: "&nabla;&phi; = (2xyz<sup>3</sup>)î + (x<sup>2</sup>z<sup>3</sup>)ĵ + (3x<sup>2</sup>yz<sup>2</sup>)k̂. Substituting x=1, y=1, z=1 gives 2î + ĵ + 3k̂." 
        },
        { 
            q: "Find the divergence of F = x<sup>2</sup>z î - 2y<sup>3</sup>z<sup>2</sup> ĵ + xy<sup>2</sup>z k̂ at the point (1, -1, 1).", 
            options: ["-3", "3", "5", "-5"], 
            answer: 0, 
            explanation: "&nabla; &middot; F = &part;F<sub>x</sub>/&part;x + &part;F<sub>y</sub>/&part;y + &part;F<sub>z</sub>/&part;z = 2xz - 6y<sup>2</sup>z<sup>2</sup> + xy<sup>2</sup>. At (1, -1, 1), this is 2(1) - 6(1) + 1(1) = -3." 
        },
        { 
            q: "Determine the value of 'a' so that the vector F = (x + 3y)î + (y - 2z)ĵ + (x + az)k̂ is solenoidal.", 
            options: ["-2", "2", "0", "1"], 
            answer: 0, 
            explanation: "For a solenoidal vector, &nabla; &middot; F = 0. Divergence is 1 + 1 + a = 0, which means a = -2." 
        },
        { 
            q: "Find the directional derivative of &phi; = 2x<sup>2</sup> + 3y<sup>2</sup> + z<sup>2</sup> at the point (2, 1, 3) along the x-axis.", 
            options: ["8", "6", "10", "4"], 
            answer: 0, 
            explanation: "Directional derivative along x-axis is simply &part;&phi;/&part;x. &part;&phi;/&part;x = 4x. At x = 2, it is 4(2) = 8." 
        },
        { 
            q: "Calculate the work done by the force F = y î + x ĵ in moving a particle from (0,0) to (1,1) along the path y = x.", 
            options: ["1", "0", "0.5", "2"], 
            answer: 0, 
            explanation: "Work = &int; F &middot; dr = &int; (y dx + x dy) = &int; d(xy). The integral from (0,0) to (1,1) is [xy] = (1&times;1) - (0&times;0) = 1." 
        },
        { 
            q: "Evaluate &nabla;<sup>2</sup>(x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup>).", 
            options: ["6x + 6y + 6z", "3x<sup>2</sup> + 3y<sup>2</sup> + 3z<sup>2</sup>", "6xyz", "0"], 
            answer: 0, 
            explanation: "Laplacian &nabla;<sup>2</sup> = &part;<sup>2</sup>/&part;x<sup>2</sup> + &part;<sup>2</sup>/&part;y<sup>2</sup> + &part;<sup>2</sup>/&part;z<sup>2</sup>. The second derivative of x<sup>3</sup> is 6x. Summing them gives 6x + 6y + 6z." 
        },
        { 
            q: "Find the unit normal vector to the surface x<sup>2</sup> + y<sup>2</sup> - z = 1 at the point (1, 1, 1).", 
            options: ["(2î + 2ĵ - k̂) / 3", "(î + ĵ - k̂) / &radic;3", "(2î + ĵ - 2k̂) / 3", "î + ĵ - k̂"], 
            answer: 0, 
            explanation: "&nabla;&phi; = 2x î + 2y ĵ - k̂. At (1,1,1), &nabla;&phi; = 2î + 2ĵ - k̂. Magnitude = &radic;(4+4+1) = 3. Unit normal = (2î + 2ĵ - k̂) / 3." 
        },
        { 
            q: "Using Green's Theorem, evaluate &oint; (x dy - y dx) around the unit circle x<sup>2</sup> + y<sup>2</sup> = 1.", 
            options: ["2&pi;", "&pi;", "0", "-2&pi;"], 
            answer: 0, 
            explanation: "P = -y, Q = x. &part;Q/&part;x - &part;P/&part;y = 1 - (-1) = 2. By Green's theorem, &int;&int; 2 dA = 2 &times; (Area of unit circle) = 2&pi;." 
        },
        { 
            q: "What is the divergence of the position vector r = x î + y ĵ + z k̂?", 
            options: ["3", "1", "0", "r"], 
            answer: 0, 
            explanation: "&nabla; &middot; r = &part;x/&part;x + &part;y/&part;y + &part;z/&part;z = 1 + 1 + 1 = 3." 
        },
        { 
            q: "If F = (axy - z<sup>3</sup>)î + (a-2)x<sup>2</sup> ĵ + (1-a)xz<sup>2</sup> k̂ is irrotational, what is the value of 'a'?", 
            options: ["4", "2", "0", "-4"], 
            answer: 0, 
            explanation: "For irrotational, curl is zero. The z-component of curl is &part;F<sub>y</sub>/&part;x - &part;F<sub>x</sub>/&part;y = 2(a-2)x - ax = 0. Solving 2a - 4 - a = 0 gives a = 4." 
        },
        { 
            q: "Calculate &nabla; &times; (&nabla;&phi;) where &phi; = x<sup>2</sup>y + y<sup>2</sup>z.", 
            options: ["0", "2x î + 2y ĵ", "î + ĵ + k̂", "x î + y ĵ + z k̂"], 
            answer: 0, 
            explanation: "The curl of the gradient of any scalar field is always a zero vector by mathematical identity: &nabla; &times; (&nabla;&phi;) = 0." 
        },
        { 
            q: "Find &nabla; &middot; (r/r<sup>3</sup>), where r is the position vector and r is its magnitude.", 
            options: ["0 (for r &ne; 0)", "3/r<sup>3</sup>", "-3/r<sup>4</sup>", "1/r<sup>2</sup>"], 
            answer: 0, 
            explanation: "This is a standard result. &nabla; &middot; (r/r<sup>3</sup>) = 0 everywhere except at the origin (where it behaves as a Dirac delta function)." 
        },
        { 
            q: "If r = t<sup>2</sup> î + 2t ĵ - t<sup>3</sup> k̂, find the magnitude of velocity (dr/dt) at t = 1.", 
            options: ["&radic;17", "4", "&radic;13", "5"], 
            answer: 0, 
            explanation: "v = dr/dt = 2t î + 2 ĵ - 3t<sup>2</sup> k̂. At t=1, v = 2î + 2ĵ - 3k̂. Magnitude = &radic;(2<sup>2</sup> + 2<sup>2</sup> + (-3)<sup>2</sup>) = &radic;(4 + 4 + 9) = &radic;17." 
        },
        { 
            q: "Find the constant 'c' such that F = (x + y)î + (x - z)ĵ + (c x + y)k̂ is conservative.", 
            options: ["Not possible for any 'c'", "0", "1", "-1"], 
            answer: 0, 
            explanation: "For F to be conservative, &nabla; &times; F = 0. The y-component of curl is &part;F<sub>x</sub>/&part;z - &part;F<sub>z</sub>/&part;x = 0 - c = -c. So c=0. But z-comp is &part;F<sub>y</sub>/&part;x - &part;F<sub>x</sub>/&part;y = 1 - 1 = 0. Wait, x-comp is &part;F<sub>z</sub>/&part;y - &part;F<sub>y</sub>/&part;z = 1 - (-1) = 2 &ne; 0. Thus, the field can NEVER be conservative!" 
        },
        { 
            q: "Evaluate the line integral of F = 3xy î - y<sup>2</sup> ĵ along the curve C: y = 2x<sup>2</sup> from (0,0) to (1,2).", 
            options: ["-7/6", "5/6", "1", "7/6"], 
            answer: 0, 
            explanation: "Substitute y = 2x<sup>2</sup> and dy = 4x dx into &int;(3xy dx - y<sup>2</sup> dy). The integral becomes &int;<sub>0</sub><sup>1</sup> [3x(2x<sup>2</sup>) - (2x<sup>2</sup>)<sup>2</sup>(4x)] dx = &int; (6x<sup>3</sup> - 16x<sup>5</sup>) dx. Evaluating gives (6/4) - (16/6) = 3/2 - 8/3 = (9-16)/6 = -7/6." 
        }
    ];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let shuffledQuizData = shuffleArray([...quizData]);
    let currentQuestion = 0;
    let score = 0;
    let hasAnswered = false;

    const questionEl = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedbackBox = document.getElementById('feedback-box');
    const nextBtn = document.getElementById('next-btn');
    const progressEl = document.getElementById('progress');
    const qTracker = document.getElementById('q-tracker');
    const scoreTracker = document.getElementById('score-tracker');
    const quizBox = document.getElementById('quiz-content');
    const resultBox = document.getElementById('result-content');

    function loadQuestion() {
        hasAnswered = false;
        feedbackBox.className = 'feedback';
        feedbackBox.style.display = 'none';
        nextBtn.style.display = 'none';
        
        const qData = shuffledQuizData[currentQuestion];
        questionEl.innerHTML = qData.q; // Using innerHTML for superscripts
        
        optionsContainer.innerHTML = '';
        
        let optionsWithIndex = qData.options.map((opt, index) => ({
            text: opt,
            isCorrect: index === qData.answer
        }));
        
        optionsWithIndex = shuffleArray(optionsWithIndex);

        optionsWithIndex.forEach((optData) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerHTML = optData.text;
            if(optData.isCorrect) btn.dataset.correct = "true";
            
            btn.onclick = () => checkAnswer(optData, btn);
            optionsContainer.appendChild(btn);
        });

        const progressPercent = (currentQuestion / shuffledQuizData.length) * 100;
        progressEl.style.width = progressPercent + '%';
        qTracker.textContent = `Question: ${currentQuestion + 1}/${shuffledQuizData.length}`;
    }

    function checkAnswer(selectedOptionData, btnElement) {
        if (hasAnswered) return;
        hasAnswered = true;

        const allButtons = document.querySelectorAll('.option');

        allButtons.forEach(btn => {
            btn.classList.add('disabled');
            if (btn.dataset.correct === "true") {
                btn.classList.add('correct');
            }
        });

        if (selectedOptionData.isCorrect) {
            score++;
            scoreTracker.textContent = `Score: ${score}`;
            showFeedback(true, "Correct! \n\nSolution: " + shuffledQuizData[currentQuestion].explanation);
        } else {
            btnElement.classList.add('wrong');
            showFeedback(false, "Incorrect. \n\nSolution: " + shuffledQuizData[currentQuestion].explanation);
        }

        nextBtn.style.display = 'block';
    }

    function showFeedback(isCorrect, text) {
        feedbackBox.innerHTML = text; // innerHTML for math formatting
        feedbackBox.style.display = 'block';
        feedbackBox.style.backgroundColor = isCorrect ? '#d5f5e3' : '#fadbd8';
        feedbackBox.style.color = isCorrect ? '#1e8449' : '#922b21';
        feedbackBox.style.border = `1px solid ${isCorrect ? '#2ecc71' : '#e74c3c'}`;
        feedbackBox.classList.add('show');
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < shuffledQuizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizBox.style.display = 'none';
        document.querySelector('.stats').style.display = 'none';
        progressEl.style.width = '100%';
        resultBox.style.display = 'block';
        
        const finalScoreEl = document.getElementById('final-score');
        const messageEl = document.getElementById('result-message');
        
        finalScoreEl.textContent = `${score} / ${shuffledQuizData.length}`;
        
        const percentage = (score / shuffledQuizData.length) * 100;
        if (percentage >= 80) {
            messageEl.innerHTML = "<strong>Bahut badhiya!</strong> Aapki numerical solving speed aur accuracy exam ke hisaab se perfect hai.";
        } else if (percentage >= 50) {
            messageEl.innerHTML = "<strong>Good effort!</strong> Thodi formulas aur integration steps ki aur practice karni hogi.";
        } else {
            messageEl.innerHTML = "<strong>Needs Review.</strong> Ek baar phir se del operator (∇) ki properties aur integral calculation methods check karo.";
        }
    }

    loadQuestion();
</script>

</body>
</html>s
